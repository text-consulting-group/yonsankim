{{/** 
    title : banner
    layout :
      - business
  **/}}
<div class="bg-aa-gray-700 bg-no-repeat bg-cover bg-center" style="background-image: linear-gradient(90deg, rgba(15,23,42,0.86) 0%, rgba(15,23,42,0.58) 58%, rgba(15,23,42,0.3) 100%), url('/img/home-aerial-1963.jpg');">
  <div class="py-36">
    <div class="text-center">
      <h2 class="mb-8 text-4xl leading-none text-white">{{ T "home_banner_title_top" }}</h2>
      <h2 class="mb-8 text-4xl leading-none text-white">{{ T "home_banner_title_bottom" }}</h2>
      <div class="mx-auto mb-8 max-w-4xl text-base leading-7 text-white lg:text-lg">
        <p>{{ T "home_banner_p1" }}</p>
        <p>{{ T "home_banner_p2" }}</p>
        <p>{{ T "home_banner_p3" }}</p>
      </div>
      <div class="flex flex-wrap justify-center gap-3">
        <a href="{{ "document/" | relLangURL }}">
          <button class="inline-flex rounded-full border-0 bg-blue-500 px-6 py-2 text-lg text-white hover:bg-blue-600 focus:outline-none">{{ T "home_banner_document" }}</button>
        </a>
        <a href="{{ "research-guide/" | relLangURL }}">
          <button class="inline-flex rounded-full border border-white px-6 py-2 text-lg text-white hover:bg-white hover:text-gray-900 focus:outline-none">{{ T "home_banner_guide" }}</button>
        </a>
      </div>
    </div>
  </div>
</div>
