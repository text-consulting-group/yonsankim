{{- $taxonomy := .taxonomy -}}
{{- $label := .label -}}
{{- $page := .page -}}
{{- $terms := $page.GetTerms $taxonomy -}}
{{- if $terms }}
  <div>
    <p class="text-slate-500">{{ $label }}</p>
    <div class="mt-2 flex flex-wrap gap-2">
      {{- range $terms }}
        <a href="{{ .RelPermalink }}" class="rounded-full bg-slate-100 px-3 py-1 text-slate-700 underline decoration-transparent decoration-1 underline-offset-4 transition hover:bg-slate-200 hover:text-blue-600 hover:decoration-blue-500">{{ .LinkTitle }}</a>
      {{- end -}}
    </div>
  </div>
{{- end -}}
