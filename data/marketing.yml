############################ faqs ##########################
faq:
  title: 자주 묻는 질문
  enable: true
  content: 이 아카이브를 어떻게 읽고 활용할지에 관한 기본 질문을 모았습니다.
  url: https://yongsankim.textconsulting.io/
  listItem:
    - question: 이 아카이브에는 어떤 자료가 들어 있나요?
      answer: 미군이 생산한 기록사진, 해방 직후와 냉전기의 항공사진, 용산 답사 자료, 세미나와 토론회 기록이 함께 들어 있습니다.
    - question: 어떤 순서로 탐색하면 가장 좋나요?
      answer: 큰 폴더를 먼저 고르고, 그다음 시리즈명이나 레코드그룹을 본 뒤, 생산조직과 생산자, 날짜, 자유 검색으로 좁혀가는 방식이 가장 안정적입니다.
    - question: 왜 공개 화면에서는 원본 대신 썸네일만 보이나요?
      answer: 공개 사이트에서 원본 고해상도 이미지가 직접 노출되지 않도록, 대표 이미지와 상세 미리보기는 /_thumbs 경로의 파생 썸네일을 사용합니다.
    - question: 1. 기록물 원본 파일과 2. 미군기지와 도시산책은 무엇이 다른가요?
      answer: 전자는 군 기록의 행정 질서를 따르는 원본 자료군이고, 후자는 도시산책과 장소 해석의 경로를 따라 다시 구성한 공개용 읽기 층입니다.
    - question: 이 아카이브는 어떤 질문을 던지나요?
      answer: 누가 용산을 기록했는가, 그 기록은 어떤 권력과 행정 질서 속에서 생산되었는가, 그리고 오늘 우리는 그 기록을 어떤 공원 담론과 도시 기억으로 다시 읽는가를 묻습니다.
faq_en:
  title: Frequently Asked Questions
  enable: true
  content: A short set of basic questions about how to read and use this archive.
  url: https://yongsankim.textconsulting.io/
  listItem:
    - question: What kinds of materials are in this archive?
      answer: The corpus includes U.S. military record photographs, post-liberation and Cold War aerial views, Yongsan walk materials, and records from seminars and public discussions.
    - question: What is the most stable way to navigate it?
      answer: Start with the larger folder, then narrow by series name or record group, then use source organization, creator, date, and free search.
    - question: Why do public pages show thumbnails instead of originals?
      answer: To avoid exposing high-resolution originals directly on the public site, visible previews use derived thumbnails under the /_thumbs path.
    - question: What is the difference between Original Record Files and Guided Walks through the U.S. Base and the City?
      answer: The former follows the administrative order of military records, while the latter reorganizes materials through curated routes of place reading and urban interpretation.
    - question: What question does this archive ultimately ask?
      answer: It asks who recorded Yongsan, under what power and administrative order those records were produced, and how we reread them today through park discourse and urban memory.

